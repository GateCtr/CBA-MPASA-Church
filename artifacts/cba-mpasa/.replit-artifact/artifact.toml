kind = "web"
previewPath = "/"
title = "Site Web CBA-MPASA"
version = "1.0.0"
id = "artifacts/cba-mpasa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25241

[services.development]
run = "pnpm --filter @workspace/cba-mpasa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cba-mpasa", "run", "build" ]
publicDir = "artifacts/cba-mpasa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25241"
BASE_PATH = "/"
